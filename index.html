<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anu's Boutique</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #ffffff;
    color: #111;
}

/* HEADER */
header {
    text-align: center;
    padding: 30px 20px;
    border-bottom: 1px solid #eee;
}

header h1 {
    margin: 0;
    font-size: 32px;
    letter-spacing: 1px;
}

header p {
    margin-top: 5px;
    font-size: 14px;
    color: #777;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 30px;
    padding: 40px;
}

/* CARD */
.card {
    text-align: center;
}

.card img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    border-radius: 4px;
    transition: 0.3s;
}

.card img:hover {
    transform: scale(1.03);
}

.card h3 {
    margin: 10px 0 5px;
    font-size: 16px;
}

.price {
    font-weight: bold;
    color: #111;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 18px;
    border: 1px solid #111;
    color: #111;
    text-decoration: none;
    font-size: 14px;
    transition: 0.3s;
}

.btn:hover {
    background: #111;
    color: #fff;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    border-top: 1px solid #eee;
    font-size: 13px;
    color: #777;
}
</style>

</head>

<body>

<header>
    <h1>Anu's Boutique</h1>
    <p>Luxury Jewelry Collection</p>
</header>

<div class="grid">

    <div class="card">
        <img src="churi.jpg" alt="Churi">
        <h3>Gold Churi Set</h3>
        <p class="price">৳250</p>
        <a class="btn" href="https://wa.me/8801410067444" target="_blank">Shop Now</a>
    </div>

    <div class="card">
        <img src="earrings.jpg" alt="Earrings">
        <h3>Elegant Earrings</h3>
        <p class="price">৳350</p>
        <a class="btn" href="https://wa.me/8801410067444" target="_blank">Shop Now</a>
    </div>

    <div class="card">
        <img src="necklace.jpg" alt="Necklace">
        <h3>Bridal Necklace</h3>
        <p class="price">৳850</p>
        <a class="btn" href="https://wa.me/8801410067444" target="_blank">Shop Now</a>
    </div>

</div>

<footer>
    © 2026 Anu's Boutique | All Rights Reserved
</footer>

</body>
</html>
